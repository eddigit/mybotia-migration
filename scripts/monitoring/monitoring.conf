#!/bin/bash
# monitoring.conf — Configuration du monitoring MyBotIA
# chmod 600 — contient des secrets

# === ENVIRONNEMENT CRON ===
# Necessaire pour que systemctl --user et docker fonctionnent depuis cron
export XDG_RUNTIME_DIR="/run/user/$(id -u)"
export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/gilles/.npm-global/bin"

# === CHEMINS ===
OPENCLAW_BIN="/home/gilles/.npm-global/bin/openclaw"
MONITORING_DIR="/home/gilles/scripts/monitoring"
STATE_DIR="${MONITORING_DIR}/state"
LOG_DIR="${MONITORING_DIR}/logs"
LOG_FILE="${LOG_DIR}/monitoring.log"

# === GATEWAY ===
GATEWAY_MYBOTIA_PORT=18789
GATEWAY_VLMEDICAL_PORT=18790
GATEWAY_MYBOTIA_URL="http://127.0.0.1:${GATEWAY_MYBOTIA_PORT}"
GATEWAY_VLMEDICAL_URL="http://127.0.0.1:${GATEWAY_VLMEDICAL_PORT}"
GATEWAY_LUCY_PORT=18795
GATEWAY_LUCY_URL="http://127.0.0.1:${GATEWAY_LUCY_PORT}"
GATEWAY_LUCY_CONFIG="/home/gilles/.openclaw-lucy/openclaw.json"
GATEWAY_LUCY_STATE="/home/gilles/.openclaw-lucy"

# === TELEGRAM (alertes directes, independant du gateway) ===
TELEGRAM_BOT_TOKEN="<TELEGRAM_BOT_TOKEN_JACQUES>"
TELEGRAM_CHAT_ID="1801835052"

# === WHATSAPP (via OpenClaw CLI) ===
WHATSAPP_TARGET="+33652345180"

# === EMAIL ===
EMAIL_TO="coachdigitalparis@gmail.com"

# === SEUILS (alignés SLO SRE 2026-03-29) ===
RAM_THRESHOLD_PERCENT=75
RAM_THRESHOLD_CRIT=85
DISK_THRESHOLD_PERCENT=80
DISK_THRESHOLD_CRIT=90
SWAP_THRESHOLD_WARN=40   # % swap utilise → WARN (alerte preventive)
SWAP_THRESHOLD_CRIT=60   # % swap utilise → CRIT (alerte urgente)
RESTART_LOOP_WARN=5      # +N restarts en 5min → WARN
RESTART_LOOP_CRIT=15     # +N restarts en 5min → CRIT
DEBOUNCE_SECONDS=1800    # 30 minutes (alertes normales)
DEBOUNCE_URGENT_SECONDS=300  # 5 minutes (alertes critiques RAM/restart)

# === SOUS-DOMAINES ===
SUBDOMAINS="lea julian nina oscar max eva app"

# === GITHUB (version check) ===
GITHUB_REPO="openclaw/openclaw"
